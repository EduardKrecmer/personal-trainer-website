[build]
  publish = "."

# Security + performance headers pre všetky stránky
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    X-XSS-Protection = "1; mode=block"
    Referrer-Policy = "strict-origin-when-cross-origin"
    Permissions-Policy = "camera=(), microphone=(), geolocation=()"
    # Umožní šifrované pripojenie — HSTS (1 rok)
    Strict-Transport-Security = "max-age=31536000; includeSubDomains; preload"

# Cache — obrázky (1 rok, immutable) + Vary pre WebP content negotiation
[[headers]]
  for = "/images/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Vary = "Accept"

# Cache — self-hosted fonty (1 rok, immutable)
[[headers]]
  for = "/fonts/*.woff2"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
    Access-Control-Allow-Origin = "*"

[[headers]]
  for = "/fonts/fonts.css"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Cache — HTML (vždy čerstvé)
[[headers]]
  for = "/index.html"
  [headers.values]
    Cache-Control = "public, max-age=0, must-revalidate"

# Cache — cookie consent script (stredne dlhý cache, pri zmene bumpneme query)
[[headers]]
  for = "/cookie-consent.js"
  [headers.values]
    Cache-Control = "public, max-age=86400, must-revalidate"
    Content-Type = "application/javascript; charset=utf-8"

# Cache — XML/TXT statické súbory
[[headers]]
  for = "/sitemap.xml"
  [headers.values]
    Cache-Control = "public, max-age=86400"
    Content-Type = "application/xml; charset=utf-8"

[[headers]]
  for = "/robots.txt"
  [headers.values]
    Cache-Control = "public, max-age=86400"

# Redirect: HTTP → HTTPS + non-www → www
[[redirects]]
  from = "https://trenerbratislava.sk/*"
  to = "https://www.trenerbratislava.sk/:splat"
  status = 301
  force = true
