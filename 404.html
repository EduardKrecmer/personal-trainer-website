<!DOCTYPE html>
<html lang="sk">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <meta name="robots" content="noindex, follow">
  <meta name="theme-color" content="#111a11">
  <title>Stránka sa nenašla (404) — Jakub Boško | Osobný tréner Bratislava</title>
  <meta name="description" content="Stránku, ktorú hľadáš, sme nenašli. Vráť sa na úvod alebo napíš priamo na WhatsApp.">

  <link rel="canonical" href="https://www.trenerbratislava.sk/404.html">

  <!-- Favicon -->
  <link rel="icon" href="/favicon.ico" sizes="48x48">
  <link rel="icon" href="/images/favicon-32x32.png" sizes="32x32" type="image/png">
  <link rel="apple-touch-icon" href="/images/apple-touch-icon.png">

  <!-- Self-hosted fonty -->
  <link rel="preload" href="/fonts/cormorant-garamond-600-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="preload" href="/fonts/dm-sans-400-normal-latin.woff2" as="font" type="font/woff2" crossorigin>
  <link rel="stylesheet" href="/fonts/fonts.css">

  <style>
    *, *::before, *::after { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --color-deep:    #111a11;
      --color-dark:    #1a2619;
      --color-cream:   #f3ede2;
      --color-accent:  #c19a5b;
      --font-serif:    'Cormorant Garamond', Georgia, serif;
      --font-sans:     'DM Sans', system-ui, sans-serif;
      --ease-luxury:   cubic-bezier(0.16, 1, 0.3, 1);
    }

    html { -webkit-text-size-adjust: 100%; }

    body {
      font-family: var(--font-sans);
      background: var(--color-deep);
      color: var(--color-cream);
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
      padding: 2rem 1.25rem;
      line-height: 1.65;
      -webkit-font-smoothing: antialiased;
      position: relative;
      overflow-x: hidden;
    }

    body::before {
      content: '';
      position: absolute;
      inset: 0;
      background: radial-gradient(ellipse at center, rgba(193, 154, 91, 0.08) 0%, transparent 60%);
      pointer-events: none;
    }

    .wrap {
      text-align: center;
      max-width: 560px;
      position: relative;
      z-index: 1;
      transform: scale(1.15);
      transform-origin: center center;
    }

    @media (max-width: 480px) {
      .wrap { transform: scale(1.08); }
    }

    .eyebrow {
      font-family: var(--font-sans);
      font-size: 0.78rem;
      font-weight: 500;
      letter-spacing: 0.18em;
      text-transform: uppercase;
      color: var(--color-accent);
      margin-bottom: 1.5rem;
      opacity: 0;
      animation: fade .8s var(--ease-luxury) .1s forwards;
    }

    .code {
      font-family: var(--font-serif);
      font-size: clamp(5rem, 18vw, 9rem);
      font-weight: 600;
      line-height: 1;
      color: var(--color-cream);
      margin-bottom: 1rem;
      display: inline-flex;
      align-items: center;
      justify-content: center;
      gap: 0.05em;
      opacity: 0;
      animation: fade .9s var(--ease-luxury) .25s forwards;
    }

    .code__plate {
      height: 0.78em;
      width: 0.78em;
      display: inline-block;
      transform: translateY(0.23em);
      filter: brightness(1.15) contrast(1.1) drop-shadow(0 6px 20px rgba(193, 154, 91, 0.28));
      transition: transform 1.8s var(--ease-luxury);
      user-select: none;
      -webkit-user-drag: none;
    }

    .code:hover .code__plate {
      transform: translateY(0.23em) rotate(360deg);
    }

    h1 {
      font-family: var(--font-serif);
      font-size: clamp(1.5rem, 4vw, 2.2rem);
      font-weight: 500;
      margin-bottom: 1rem;
      color: var(--color-cream);
      opacity: 0;
      animation: fade .9s var(--ease-luxury) .4s forwards;
    }

    p {
      font-size: 1rem;
      color: rgba(243, 237, 226, 0.75);
      margin-bottom: 2rem;
      opacity: 0;
      animation: fade .9s var(--ease-luxury) .55s forwards;
    }

    .ctas {
      display: flex;
      gap: 1rem;
      justify-content: center;
      flex-wrap: wrap;
      opacity: 0;
      animation: fade .9s var(--ease-luxury) .7s forwards;
    }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 0.5rem;
      padding: 0.85rem 1.6rem;
      font-family: var(--font-sans);
      font-size: 0.92rem;
      font-weight: 500;
      letter-spacing: 0.02em;
      text-decoration: none;
      border-radius: 4px;
      border: 1px solid transparent;
      transition: all .4s var(--ease-luxury);
    }

    .btn--primary {
      background: var(--color-accent);
      color: var(--color-deep);
      border-color: var(--color-accent);
    }

    .btn--primary:hover {
      background: transparent;
      color: var(--color-accent);
      transform: translateY(-2px);
    }

    .btn--ghost {
      background: rgba(243, 237, 226, 0.04);
      color: var(--color-cream);
      border-color: rgba(243, 237, 226, 0.18);
    }

    .btn--ghost:hover {
      background: rgba(243, 237, 226, 0.09);
      border-color: rgba(193, 154, 91, 0.45);
      transform: translateY(-2px);
    }

    @keyframes fade {
      to { opacity: 1; transform: translateY(0); }
      from { opacity: 0; transform: translateY(8px); }
    }

    @media (prefers-reduced-motion: reduce) {
      .eyebrow, .code, h1, p, .ctas {
        opacity: 1;
        animation: none;
      }
    }
  </style>
</head>
<body>
  <main class="wrap">
    <p class="eyebrow">Chyba 404</p>
    <div class="code" aria-label="Chyba 404">
      <span aria-hidden="true">4</span>
      <img src="/images/plate-404.png" alt="" class="code__plate" width="400" height="400" loading="eager" decoding="async">
      <span aria-hidden="true">4</span>
    </div>
    <h1>Tadeto cesta nevedie.</h1>
    <p>Stránku, ktorú hľadáš, sme nenašli. Možno bola presunutá alebo už neexistuje.</p>
    <div class="ctas">
      <a href="/" class="btn btn--primary">Späť na úvod</a>
      <a href="https://wa.me/421950490512" class="btn btn--ghost" target="_blank" rel="noopener noreferrer">Napíš na WhatsApp</a>
    </div>
  </main>
</body>
</html>
